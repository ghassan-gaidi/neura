openapi: "3.1.0"
info:
  title: Neura API
  description: |
    External brain for AI agents. Gives stateless agents persistent
    memory and state via simple HTTP endpoints.

    Every error is machine-readable so agents can retry intelligently
    without human help.

    Base URL: `https://neura.sh`
  version: "0.2.0"
  contact:
    name: Neura
    url: https://neura.sh
servers:
  - url: https://neura.sh
    description: Production
  - url: http://localhost:3000
    description: Local dev
paths:
  # ─── Memory ───────────────────────────────────────────────
  /api/memory:
    post:
      summary: Store a memory
      description: |
        Stores a piece of information with automatic embedding via OpenAI.
        The content is vectorized and indexed for semantic search.

        Use this for: facts, preferences, conversation summaries, task results.
      operationId: createMemory
      tags: [Memory]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMemoryInput"
            example:
              content: The user prefers dark mode in all applications
              tags: [preference, ui]
              importance: 8
              metadata:
                source: conversation
      responses:
        "201":
          description: Memory created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Memory"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "402":
          $ref: "#/components/responses/PaymentRequired"
        "429":
          $ref: "#/components/responses/RateLimited"

    get:
      summary: Search or list memories
      description: |
        Performs semantic search when a `query` parameter is provided.
        Returns the most recent memories when no query is given.

        Results are ranked by cosine similarity (0.0 - 1.0).
      operationId: searchMemories
      tags: [Memory]
      security:
        - bearerAuth: []
      parameters:
        - name: query
          in: query
          description: Natural language search query
          schema:
            type: string
          example: What are my risk preferences?
        - name: limit
          in: query
          description: Maximum results to return (max 100)
          schema:
            type: integer
            default: 10
            maximum: 100
        - name: min_score
          in: query
          description: Minimum similarity score (0.0 - 1.0)
          schema:
            type: number
            default: 0.0
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Memory"
                  meta:
                    type: object
                    properties:
                      total:
                        type: integer
                      query:
                        type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
        "402":
          $ref: "#/components/responses/PaymentRequired"
        "429":
          $ref: "#/components/responses/RateLimited"

  /api/memory/batch:
    post:
      summary: Store multiple memories
      description: |
        Batch create up to 25 memories at once. Costs 1 credit per memory.
        Embeddings are generated in parallel.
      operationId: batchCreateMemories
      tags: [Memory]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BatchCreateInput"
      responses:
        "201":
          description: Memories created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      stored:
                        type: integer
                      memories:
                        type: array
                        items:
                          $ref: "#/components/schemas/Memory"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "402":
          $ref: "#/components/responses/PaymentRequired"
        "429":
          $ref: "#/components/responses/RateLimited"

    delete:
      summary: Delete multiple memories
      description: |
        Batch delete up to 100 memories by their IDs. Free operation.
      operationId: batchDeleteMemories
      tags: [Memory]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ids]
              properties:
                ids:
                  type: array
                  items:
                    type: string
                    format: uuid
                  maxItems: 100
      responses:
        "200":
          description: Memories deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      deleted:
                        type: integer
                      ids:
                        type: array
                        items:
                          type: string
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"

  /api/memory/search:
    post:
      summary: Advanced memory search
      description: |
        Search memories with fine-grained control: date ranges, tag filtering,
        metadata matching, and minimum relevance thresholds.
      operationId: advancedSearch
      tags: [Memory]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SearchMemoryInput"
      responses:
        "200":
          description: Filtered search results
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Memory"
                  meta:
                    type: object
                    properties:
                      total:
                        type: integer
                      query:
                        type: string
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "402":
          $ref: "#/components/responses/PaymentRequired"
        "429":
          $ref: "#/components/responses/RateLimited"

  /api/memory/summarize:
    post:
      summary: Summarize memories
      description: |
        Generates an LLM-based summary of recent memories.
        Costs 5 credits.
      operationId: summarizeMemories
      tags: [Memory]
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                limit:
                  type: integer
                  default: 20
                  description: Number of recent memories to summarize
                query:
                  type: string
                  description: Optional query to filter memories before summarization
      responses:
        "200":
          description: Summary generated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      summary:
                        type: string
                      memory_count:
                        type: integer
        "401":
          $ref: "#/components/responses/Unauthorized"
        "402":
          $ref: "#/components/responses/PaymentRequired"
        "429":
          $ref: "#/components/responses/RateLimited"

  /api/memory/{id}:
    patch:
      summary: Update a memory
      description: |
        Update content, metadata, tags, or importance.
        If content changes, the embedding is automatically regenerated.
      operationId: updateMemory
      tags: [Memory]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMemoryInput"
      responses:
        "200":
          description: Memory updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Memory"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "402":
          $ref: "#/components/responses/PaymentRequired"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"

    delete:
      summary: Delete a memory
      operationId: deleteMemory
      tags: [Memory]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Memory deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                      deleted:
                        type: boolean
                        enum: [true]
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"

  /api/memory/{id}/share:
    post:
      summary: Share a memory
      description: Share a memory with another tenant (agent).
      operationId: shareMemory
      tags: [Sharing]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id]
              properties:
                tenant_id:
                  type: string
                  format: uuid
                permission:
                  type: string
                  enum: [read, write]
                  default: read
      responses:
        "200":
          description: Memory shared
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"

  /api/shared-with-me:
    get:
      summary: List shared memories
      description: Returns memories that other agents have shared with you.
      operationId: listSharedMemories
      tags: [Sharing]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Shared memories
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"

  # ─── State ────────────────────────────────────────────────
  /api/state:
    post:
      summary: Set state
      description: |
        Store or update a key-value state entry.
        State is persistent between agent sessions.
      operationId: setState
      tags: [State]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertStateInput"
            example:
              key: current_goal
              value:
                task: Build the API
                priority: high
      responses:
        "201":
          description: State saved
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/StateEntry"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"

    get:
      summary: List all state
      description: Returns all key-value state entries for this agent.
      operationId: listState
      tags: [State]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: All state entries
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/StateEntry"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"

  /api/state/{key}:
    get:
      summary: Get state by key
      operationId: getState
      tags: [State]
      security:
        - bearerAuth: []
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: State entry
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/StateEntry"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"

    delete:
      summary: Delete state by key
      operationId: deleteState
      tags: [State]
      security:
        - bearerAuth: []
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: State deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      key:
                        type: string
                      deleted:
                        type: boolean
                        enum: [true]
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"

  # ─── Webhooks ─────────────────────────────────────────────
  /api/webhooks:
    post:
      summary: Register a webhook
      description: Subscribe an HTTP endpoint to Neura events.
      operationId: createWebhook
      tags: [Webhooks]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWebhookInput"
      responses:
        "201":
          description: Webhook registered
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/Webhook"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"

    get:
      summary: List webhooks
      operationId: listWebhooks
      tags: [Webhooks]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Registered webhooks
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Webhook"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"

  /api/webhooks/{id}:
    get:
      summary: Get webhook details
      operationId: getWebhook
      tags: [Webhooks]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Webhook details
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"

    patch:
      summary: Update a webhook
      operationId: updateWebhook
      tags: [Webhooks]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Webhook updated
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"

    delete:
      summary: Delete a webhook
      operationId: deleteWebhook
      tags: [Webhooks]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Webhook deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"

  /api/webhooks/retry:
    post:
      summary: Retry failed webhooks
      description: Trigger retry of all failed webhook deliveries that are due.
      operationId: retryWebhooks
      tags: [Webhooks]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Retry results
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      processed:
                        type: integer
                      succeeded:
                        type: integer
                      failed:
                        type: integer
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"

  # ─── Credits & Payments ──────────────────────────────────
  /api/credits:
    get:
      summary: Get credit balance
      description: Returns remaining credits and pricing info.
      operationId: getCredits
      tags: [Payments]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Credit balance
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/CreditsBalance"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"

  /api/payments/verify:
    post:
      summary: Verify on-chain payment
      description: |
        Verify a USDC transfer on Base and credit the agent's account.
        Accepts a transaction hash and verifies it on-chain.
      operationId: verifyPayment
      tags: [Payments]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [transaction_hash]
              properties:
                transaction_hash:
                  type: string
                  description: Base USDC transfer transaction hash
      responses:
        "200":
          description: Payment verified and credited
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"

  # ─── Auth ─────────────────────────────────────────────────
  /api/auth/me:
    get:
      summary: Get current user profile
      description: |
        Returns the authenticated user's profile and API key metadata.
        On first access, automatically provisions API key + 1,000 free credits.
        Requires Supabase Auth session token (Bearer), not an API key.
      operationId: getAuthProfile
      tags: [Auth]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      user:
                        type: object
                        properties:
                          id:
                            type: string
                          email:
                            type: string
                          plan:
                            type: string
                          created_at:
                            type: string
                      api_key:
                        $ref: "#/components/schemas/ApiKeyMeta"
                      raw_key:
                        type: string
                        description: Full API key (only on first access)
                      credits:
                        type: integer
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ─── Admin ────────────────────────────────────────────────
  /api/admin/keys:
    get:
      summary: List API keys
      description: List all API keys for the current tenant.
      operationId: listApiKeys
      tags: [Admin]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: API keys
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/ApiKeyMeta"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"

    post:
      summary: Create API key
      description: Generate a new API key for this tenant.
      operationId: createApiKey
      tags: [Admin]
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                label:
                  type: string
                  description: Human-readable label for the key
      responses:
        "201":
          description: API key created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                      label:
                        type: string
                      is_active:
                        type: boolean
                      created_at:
                        type: string
                      raw_key:
                        type: string
                        description: Full key (only shown once)
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"

  /api/admin/keys/{id}:
    delete:
      summary: Revoke API key
      description: Deactivate an API key by ID. Cannot be undone.
      operationId: revokeApiKey
      tags: [Admin]
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Key revoked
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Key already revoked
        "429":
          $ref: "#/components/responses/RateLimited"

  /api/admin/transactions:
    get:
      summary: List credit transactions
      description: Audit log of all credit movements for this tenant.
      operationId: listTransactions
      tags: [Admin]
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        "200":
          description: Transaction list
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"

  /api/admin/usage:
    get:
      summary: Get usage stats
      description: Request counts, credits consumed/purchased over a period.
      operationId: getUsage
      tags: [Admin]
      security:
        - bearerAuth: []
      parameters:
        - name: days
          in: query
          schema:
            type: integer
            default: 7
            maximum: 90
      responses:
        "200":
          description: Usage statistics
        "401":
          $ref: "#/components/responses/Unauthorized"
        "429":
          $ref: "#/components/responses/RateLimited"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: sk-xxx
      description: |
        API key in the format `sk-...`.
        Generate keys via the Neura dashboard or /api/auth/me.

  schemas:
    Memory:
      type: object
      properties:
        id:
          type: string
          format: uuid
        content:
          type: string
          description: The stored text content
        metadata:
          type: object
          description: Arbitrary JSON metadata
        tags:
          type: array
          items:
            type: string
          description: Classification tags
        importance:
          type: integer
          minimum: 0
          maximum: 10
          description: 0-10 importance scale
        score:
          type: number
          description: Cosine similarity (present only in search results)
        expires_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateMemoryInput:
      type: object
      required: [content]
      properties:
        content:
          type: string
          description: Text content to store and embed
        metadata:
          type: object
          description: Optional JSON metadata
        tags:
          type: array
          items:
            type: string
        importance:
          type: integer
          minimum: 0
          maximum: 10
          default: 0
        expires_at:
          type: string
          format: date-time
          nullable: true

    BatchCreateInput:
      type: object
      required: [memories]
      properties:
        memories:
          type: array
          minItems: 1
          maxItems: 25
          items:
            $ref: "#/components/schemas/CreateMemoryInput"

    UpdateMemoryInput:
      type: object
      properties:
        content:
          type: string
        metadata:
          type: object
        tags:
          type: array
          items:
            type: string
        importance:
          type: integer
          minimum: 0
          maximum: 10

    SearchMemoryInput:
      type: object
      properties:
        query:
          type: string
          description: Natural language query
        filters:
          type: object
          properties:
            tags:
              type: array
              items:
                type: string
            importance_min:
              type: integer
              minimum: 0
              maximum: 10
            importance_max:
              type: integer
              minimum: 0
              maximum: 10
            metadata:
              type: object
            date_from:
              type: string
              format: date-time
            date_to:
              type: string
              format: date-time
        limit:
          type: integer
          default: 10
          maximum: 100
        min_score:
          type: number
          default: 0.0

    UpsertStateInput:
      type: object
      required: [key, value]
      properties:
        key:
          type: string
          description: State key
        value:
          description: Any JSON-serializable value

    StateEntry:
      type: object
      properties:
        key:
          type: string
        value: {}
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Webhook:
      type: object
      properties:
        id:
          type: string
          format: uuid
        url:
          type: string
          format: uri
        events:
          type: array
          items:
            type: string
        is_active:
          type: boolean
        secret:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateWebhookInput:
      type: object
      required: [url, events]
      properties:
        url:
          type: string
          format: uri
          description: HTTPS endpoint to receive webhook payloads
        events:
          type: array
          items:
            type: string
            enum:
              - memory.created
              - memory.updated
              - memory.deleted
              - memory.expiring
              - state.changed
              - memory.shared
              - credits.low
          description: Event types to subscribe to
        secret:
          type: string
          description: Optional HMAC secret for signature verification

    CreditsBalance:
      type: object
      properties:
        balance:
          type: integer
        pricing:
          type: object
          properties:
            POST /api/memory:
              type: integer
            GET /api/memory:
              type: integer
          description: Credit cost per operation
        top_up:
          type: object
          properties:
            via:
              type: object
              properties:
                chain:
                  type: string
                token:
                  type: string
                recipient:
                  type: string
                pricePerThousand:
                  type: string
                minTopUp:
                  type: integer
            url:
              type: string

    ApiKeyMeta:
      type: object
      properties:
        id:
          type: string
          format: uuid
        label:
          type: string
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
        last_used_at:
          type: string
          format: date-time
          nullable: true

    ApiError:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
              description: Machine-readable error code
              example: rate_limited
            message:
              type: string
              description: Human-readable description
            action:
              type: string
              description: Suggested agent action
              example: wait_and_retry
            retry_after:
              type: integer
              description: Seconds to wait before retrying
              example: 5
            docs_url:
              type: string
              format: uri
              description: Link to relevant documentation
      required:
        - code
        - message

  responses:
    ValidationError:
      description: Invalid request body or parameters
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
          example:
            error:
              code: validation_error
              message: content is required and must be a string
              action: fix_request_body

    Unauthorized:
      description: Missing or invalid API key
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
          example:
            error:
              code: unauthorized
              message: Missing or invalid API key
              action: provide_valid_api_key
              docs_url: https://neura.sh/docs/authentication

    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"

    RateLimited:
      description: Rate limit exceeded
      headers:
        Retry-After:
          schema:
            type: integer
        X-RateLimit-Limit:
          schema:
            type: integer
        X-RateLimit-Remaining:
          schema:
            type: integer
            enum: [0]
        X-RateLimit-Reset:
          schema:
            type: integer
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"

    PaymentRequired:
      description: Insufficient credits (x402 payment required)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
          example:
            error:
              code: payment_required
              message: Insufficient credits
              action: send_payment
              retry_after: 30
              docs_url: https://neura.sh/docs/payments
