  <text x="810" y="495" font-family="Courier New, monospace" font-size="17" fill="#fff">'user preferences')</text>
  <text x="770" y="525" font-family="Courier New, monospace" font-size="15" fill="#555">// 402 → agent sends USDC → retry</text>
