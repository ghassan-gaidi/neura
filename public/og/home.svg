  <!-- Code block -->
  <text x="770" y="165" font-family="Courier New, monospace" font-size="17" fill="#888">import {'{ Neura }'}</text>
  <text x="770" y="165" font-family="Courier New, monospace" font-size="17" fill="#666">import {'{ Neura }'}</text>
  <text x="810" y="165" font-family="Courier New, monospace" font-size="17" fill="#aaa"> from 'neura-api'</text>
  <text x="770" y="195" font-family="Courier New, monospace" font-size="17" fill="#fff"/>
  <text x="770" y="225" font-family="Courier New, monospace" font-size="17" fill="#fff">const n = new Neura(){'{'}apiKey: 'sk-...'}{'}'}</text>
  <text x="770" y="255" font-family="Courier New, monospace" font-size="17" fill="#fff"/>
  <text x="770" y="285" font-family="Courier New, monospace" font-size="15" fill="#555">// Store a memory</text>
  <text x="770" y="315" font-family="Courier New, monospace" font-size="17" fill="#fff">await n.memory.create({</text>
  <text x="810" y="345" font-family="Courier New, monospace" font-size="17" fill="#fff">content: 'User hates UX'</text>
  <text x="770" y="375" font-family="Courier New, monospace" font-size="17" fill="#fff">}{'})'}</text>
  <text x="770" y="405" font-family="Courier New, monospace" font-size="17" fill="#fff"/>
  <text x="770" y="435" font-family="Courier New, monospace" font-size="15" fill="#555">// Search by meaning</text>
